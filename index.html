<!DOCTYPE html>
<html>
<head>

<title>Convoy Countdown</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="content">

            <h4>UPCOMING CONVOY</h4>

            <h1 id="title"></h1>

            <div id="countdown">

                <div class="box">
                    <span id="days">0</span>
                    <small>Days</small>
                </div>

                <div class="box">
                    <span id="hours">0</span>
                    <small>Hours</small>
                </div>

                <div class="box">
                    <span id="minutes">0</span>
                    <small>Minutes</small>
                </div>

                <div class="box">
                    <span id="seconds">0</span>
                    <small>Seconds</small>
                </div>

            </div>


            <div class="details">

                <p>
                    <b>Server:</b>
                    <span id="server"></span>
                </p>

                <p>
                    <b>Route:</b>
                    <span id="route"></span>
                </p>

            </div>


            <a id="link" target="_blank">
                View TruckersMP Event
            </a>


        </div>

    </div>

</div>


<script src="events.js"></script>
<script src="script.js"></script>


</body>

</html>
